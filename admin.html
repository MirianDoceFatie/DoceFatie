<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Elite - Mii Cakes</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --rosa: #ff69b4; 
            --marrom: #5d4037; 
            --verde: #25d366; 
            --fundo: #fdf2f5;
            --cinza: #666;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--fundo); 
            margin: 0; 
            padding: 10px; 
            color: var(--marrom);
            padding-bottom: 50px;
        }

        h2 { text-align: center; font-size: 1.1rem; text-transform: uppercase; margin: 10px 0; }

        .abas { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 5px; 
            margin-bottom: 15px; 
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--fundo);
            padding: 5px 0;
        }

        .btn-aba { 
            padding: 10px 2px; 
            border: 1px solid var(--rosa); 
            background: white; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 9px;
            color: var(--rosa);
            text-transform: uppercase;
        }

        .btn-aba.ativa { background: var(--rosa); color: white; }

        .secao { display: none; }
        .secao.ativa { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-relatorio { 
            background: #444; color: white; width: 100%; padding: 15px; 
            border: none; border-radius: 12px; margin-bottom: 15px; font-weight: bold; 
            cursor: pointer; font-size: 0.9rem;
        }

        .card { 
            background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 8px solid #ccc;
            position: relative;
        }

        .card-novo { border-left-color: var(--verde); }
        .card-reserva { border-left-color: orange; }
        .card-desistiu { border-left-color: #ff4444; opacity: 0.7; }

        .itens-pedido { 
            background: #fafafa; padding: 10px; border-radius: 8px; 
            font-size: 0.8rem; margin: 10px 0; border: 1px solid #eee;
        }

        .acoes-card { display: flex; gap: 8px; }
        .btn-mini { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
        .btn-whats { background: #e8f5e9; color: #2e7d32; }
        .btn-ok { background: var(--marrom); color: white; }
        .btn-del { background: #ffebee; color: #c62828; }

        /* Estilo Tabelas (Estoque e Config) */
        .box-config { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        .input-padrao { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin: 5px 0 15px 0; box-sizing: border-box; font-family: 'Montserrat'; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; font-size: 0.8rem; }
        th { background: var(--marrom); color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .input-estoque { width: 45px; padding: 5px; text-align: center; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>

    <h2>Mii Cakes - Gestão Elite 🍰</h2>

    <button class="btn-relatorio" onclick="gerarRelatorioProducao()">📋 Gerar Relatório de Produção</button>

    <div class="abas">
        <button class="btn-aba ativa" onclick="mudarAba('novos', this)">Pedidos</button>
        <button class="btn-aba" onclick="mudarAba('reservas', this)">Reservas</button>
        <button class="btn-aba" onclick="mudarAba('estoque', this)">Estoque</button>
        <button class="btn-aba" onclick="mudarAba('festival', this)">Festival</button>
        <button class="btn-aba" onclick="mudarAba('desistencias', this)">Desistiu</button>
        <button class="btn-aba" onclick="mudarAba('historico', this)">Histórico</button>
    </div>

    <!-- SEÇÕES DE PEDIDOS -->
    <div id="aba-novos" class="secao ativa"><div id="lista-novos"></div></div>
    <div id="aba-reservas" class="secao"><div id="lista-reservas"></div></div>
    <div id="aba-desistencias" class="secao"><div id="lista-desistencias"></div></div>
    <div id="aba-historico" class="secao"><div id="lista-historico"></div></div>

    <!-- SEÇÃO ESTOQUE -->
    <div id="aba-estoque" class="secao">
        <div class="box-config">
            <h3>📦 Controle de Fatias</h3>
            <table id="tabela-estoque">
                <thead>
                    <tr>
                        <th>Sabor</th>
                        <th>Qtd</th>
                        <th>Próxima Fornada</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="corpo-estoque"></tbody>
            </table>
        </div>
    </div>

    <!-- SEÇÃO FESTIVAL -->
    <div id="aba-festival" class="secao">
        <div class="box-config">
            <h3>📅 Detalhes do Festival</h3>
            <label>Nome do Evento</label>
            <input type="text" id="f-nome" class="input-padrao" placeholder="Ex: Festival de Fatias">
            
            <label>Local de Retirada/Evento</label>
            <input type="text" id="f-local" class="input-padrao" placeholder="Endereço completo">
            
            <div style="display:flex; gap:10px;">
                <div style="flex:1">
                    <label>Data</label>
                    <input type="text" id="f-data" class="input-padrao" placeholder="Ex: 10/05">
                </div>
                <div style="flex:1">
                    <label>Horário</label>
                    <input type="text" id="f-hora" class="input-padrao" placeholder="Ex: 14h as 18h">
                </div>
            </div>
            <button class="btn-relatorio" style="background:var(--verde)" onclick="salvarFestival()">💾 Salvar Configurações</button>
        </div>
    </div>

<script>
    const _supa = supabase.createClient('https://byowrfsxtnqoumakbina.supabase.co', 'sb_publishable_BDZCNE4WgBWiFThCvCtdNQ_WYULTwBx');

    function mudarAba(abaId, btn) {
        document.querySelectorAll('.secao').forEach(s => s.classList.remove('ativa'));
        document.querySelectorAll('.btn-aba').forEach(b => b.classList.remove('ativa'));
        document.getElementById('aba-' + abaId).classList.add('ativa');
        btn.classList.add('ativa');
        if(abaId === 'festival') carregarConfig();
    }

    async function carregarTudo() {
        const { data: pedidos } = await _supa.from('pedidos').select('*').order('created_at', { ascending: false });
        const { data: estoque } = await _supa.from('estoque').select('*').order('nome');

        // Renderizar Listas de Pedidos
        renderizarPedidos(pedidos?.filter(p => p.status === 'Novo') || [], 'lista-novos', 'card-novo');
        renderizarPedidos(pedidos?.filter(p => p.status === 'Reserva') || [], 'lista-reservas', 'card-reserva');
        renderizarPedidos(pedidos?.filter(p => p.status === 'Desistiu') || [], 'lista-desistencias', 'card-desistiu');
        renderizarPedidos(pedidos?.filter(p => p.status === 'Finalizado') || [], 'lista-historico', '');

        // Renderizar Tabela Estoque
        document.getElementById('corpo-estoque').innerHTML = estoque.map(i => `
            <tr>
                <td>${i.nome}</td>
                <td><input type="number" id="q-${i.id}" value="${i.quantidade}" class="input-estoque"></td>
                <td><input type="text" id="d-${i.id}" value="${i.dados_proximidade || ''}" style="width:70px; border:1px solid #ddd; border-radius:4px; font-size:0.7rem;"></td>
                <td><button onclick="salvarItemEstoque(${i.id})" style="border:none; background:none; cursor:pointer;">💾</button></td>
            </tr>
        `).join('');
    }

    function renderizarPedidos(lista, divId, classe) {
        const container = document.getElementById(divId);
        if(lista.length === 0) { container.innerHTML = "<p style='text-align:center; font-size:0.7rem; color:#999; padding:20px;'>Sem registros.</p>"; return; }
        
        container.innerHTML = lista.map(p => `
            <div class="card ${classe}">
                <div style="display:flex; justify-content:space-between;">
                    <strong>${p.nome}</strong>
                    <input type="checkbox" class="check-prod" data-itens="${p.itens}">
                </div>
                <small>📱 ${p.telefone}</small>
                <div class="itens-pedido">${p.itens.replace(/\n/g, '<br>')}</div>
                <div class="acoes-card">
                    <button class="btn-mini btn-whats" onclick="window.open('https://wa.me/55${p.telefone.replace(/\D/g,'')}')">ZAP</button>
                    ${p.status !== 'Finalizado' ? `<button class="btn-mini btn-ok" onclick="mudarStatus('${p.id}', 'Finalizado')">OK</button>` : ''}
                    ${p.status !== 'Desistiu' && p.status !== 'Finalizado' ? `<button class="btn-mini btn-del" onclick="mudarStatus('${p.id}', 'Desistiu')">X</button>` : ''}
                </div>
            </div>
        `).join('');
    }

    async function mudarStatus(id, status) {
        await _supa.from('pedidos').update({ status }).eq('id', id);
        carregarTudo();
    }

    async function salvarItemEstoque(id) {
        const quantidade = document.getElementById(`q-${id}`).value;
        const dados_proximidade = document.getElementById(`d-${id}`).value;
        await _supa.from('estoque').update({ quantidade, dados_proximidade }).eq('id', id);
        alert("Estoque atualizado!");
    }

    async function carregarConfig() {
        const { data } = await _supa.from('config').select('*').eq('id', 1).single();
        if(data) {
            document.getElementById('f-nome').value = data.festival_nome || '';
            document.getElementById('f-local').value = data.festival_local || '';
            document.getElementById('f-data').value = data.festival_data || '';
            document.getElementById('f-hora').value = data.festival_hora || '';
        }
    }

    async function salvarFestival() {
        const conf = {
            festival_nome: document.getElementById('f-nome').value,
            festival_local: document.getElementById('f-local').value,
            festival_data: document.getElementById('f-data').value,
            festival_hora: document.getElementById('f-hora').value
        };
        const { error } = await _supa.from('config').update(conf).eq('id', 1);
        if(!error) alert("Festival atualizado com sucesso!");
    }

    function gerarRelatorioProducao() {
        const marcados = document.querySelectorAll('.check-prod:checked');
        if(marcados.length === 0) return alert("Selecione os pedidos na caixinha!");
        let texto = "*📋 RELATÓRIO DE PRODUÇÃO*\n\n";
        marcados.forEach((m, i) => {
            texto += `*PEDIDO ${i+1}:*\n${m.getAttribute('data-itens')}\n\n`;
        });
        window.open(`https://wa.me/5535991441589?text=${encodeURIComponent(texto)}`);
    }

    setInterval(carregarTudo, 20000); // Atualiza a cada 20s
    window.onload = carregarTudo;
</script>
</body>
</html>
