<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Doce Fatia</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #fdf2f7; padding: 20px; color: #333; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; background: #ddd; font-weight: bold; }
        .tab-btn.active { background: #f858a5; color: white; }
        .section { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card-estoque { display: flex; align-items: center; gap: 15px; padding: 15px; border-bottom: 1px solid #eee; }
        .card-estoque img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85rem; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: left; }
        .linha-venda { background-color: #e8f5e9 !important; } 
        .status-venda { color: #2cc149; font-weight: bold; }
        .status-pendente { color: #666; font-style: italic; }
        .btn-salvar { background: #f858a5; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        .badge-reserva { background: #ff9800; color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        #container-lote { margin-top: 15px; padding: 10px 20px; background: #f858a5; color: white; border-radius: 10px; display: none; justify-content: space-between; align-items: center; }
        .btn-lote { background: white; color: #f858a5; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h2 style="color: #f858a5; text-align: center;">Gerenciamento Mii Cakes 🍰</h2>

    <div class="tabs">
        <button class="tab-btn active" id="btn-tab-est" onclick="showTab('estoque')">📦 Estoque</button>
        <button class="tab-btn" id="btn-tab-rel" onclick="showTab('relatorio')">📊 Relatório</button>
        <button class="tab-btn" id="btn-tab-res" onclick="showTab('reservas')">📅 Reservas Sábado</button>
    </div>

    <div id="tab-estoque" class="section">
        <h3>Controle de Fatias</h3>
        <div id="lista-estoque">Carregando...</div>
    </div>

    <div id="tab-relatorio" class="section" style="display:none;">
        <div id="container-lote">
            <span id="txt-selecionados">0 selecionados</span>
            <button class="btn-lote" onclick="enviarLoteWhatsApp()">📲 Enviar p/ WhatsApp</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th><input type="checkbox" onclick="selecionarTodos(this)"></th>
                    <th>Data</th>
                    <th>Itens</th>
                    <th>WhatsApp</th>
                    <th>Valor</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="lista-pedidos"></tbody>
        </table>
    </div>

    <div id="tab-reservas" class="section" style="display:none;">
        <h3>📌 Reservas Ativas</h3>
        <table>
            <thead>
                <tr>
                    <th>WhatsApp</th>
                    <th>Itens Reservados</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="lista-reservas-sabado"></tbody>
        </table>
    </div>

<script>
    const supa = supabase.createClient('https://byowrfsxtnqoumakbina.supabase.co', 'sb_publishable_BDZCNE4WgBWiFThCvCtdNQ_WYULTwBx');
    let pedCache = [];

    function showTab(tab) {
        localStorage.setItem('mii_cakes_aba', tab); // SALVA A ABA NA MEMÓRIA

        document.getElementById('tab-estoque').style.display = tab === 'estoque' ? 'block' : 'none';
        document.getElementById('tab-relatorio').style.display = tab === 'relatorio' ? 'block' : 'none';
        document.getElementById('tab-reservas').style.display = tab === 'reservas' ? 'block' : 'none';
        
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if(tab === 'estoque') document.getElementById('btn-tab-est').classList.add('active');
        if(tab === 'relatorio') document.getElementById('btn-tab-rel').classList.add('active');
        if(tab === 'reservas') document.getElementById('btn-tab-res').classList.add('active');
        
        if(tab !== 'estoque') carregarRelatorio();
    }

    async function carregarEstoque() {
        const { data } = await supa.from('estoque').select('*').order('nome');
        document.getElementById('lista-estoque').innerHTML = data.map(b => `
            <div class="card-estoque">
                <img src="${b.foto}">
                <div style="flex:1">
                    <b>${b.nome}</b><br>
                    Qtd: <input type="number" id="q-${b.id}" value="${b.Quantidade}" style="width:40px;">
                    Volta: <input type="text" id="d-${b.id}" value="${b.proxima_data||''}" placeholder="Ex: Sábado" style="width:70px;">
                </div>
                <button class="btn-salvar" onclick="salvarEstoque(${b.id})">OK</button>
            </div>
        `).join('');
    }

    async function salvarEstoque(id) {
        const q = document.getElementById(`q-${id}`).value;
        const d = document.getElementById(`d-${id}`).value;
        await supa.from('estoque').update({ Quantidade: q, proxima_data: d }).eq('id', id);
        alert("Atualizado!");
        carregarEstoque();
    }

    async function carregarRelatorio() {
        const { data } = await supa.from('pedidos').select('*').order('created_at', { ascending: false });
        pedCache = data;
        
        document.getElementById('lista-pedidos').innerHTML = data.map(p => `
            <tr class="${p.status === 'Venda' ? 'linha-venda' : ''}">
                <td><input type="checkbox" class="check-p" value="${p.id}" onchange="atualizarLote()"></td>
                <td>${new Date(p.created_at).toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'})}</td>
                <td>${p.itens}</td>
                <td><a href="https://wa.me/55${p.telefone.replace(/\D/g,'')}" target="_blank">Enviar WA</a></td>
                <td>R$ ${p.valor.toFixed(2)}</td>
                <td>
                    <button onclick="setStatus(${p.id}, 'Venda')">✅</button>
                    <button onclick="setStatus(${p.id}, 'Cancelado')">❌</button>
                </td>
            </tr>
        `).join('');

        const reservas = data.filter(p => p.itens.includes('[RESERVA]'));
        document.getElementById('lista-reservas-sabado').innerHTML = reservas.map(r => `
            <tr>
                <td>${r.telefone}</td>
                <td><span class="badge-reserva">SÁBADO</span> ${r.itens}</td>
                <td>${r.status}</td>
            </tr>
        `).join('') || '<tr><td colspan="3">Sem reservas.</td></tr>';
    }

    async function setStatus(id, s) {
        await supa.from('pedidos').update({ status: s }).eq('id', id);
        carregarRelatorio();
    }

    function selecionarTodos(m) {
        document.querySelectorAll('.check-p').forEach(c => c.checked = m.checked);
        atualizarLote();
    }

    function atualizarLote() {
        const n = document.querySelectorAll('.check-p:checked').length;
        document.getElementById('txt-selecionados').innerText = `${n} selecionados`;
        document.getElementById('container-lote').style.display = n > 0 ? 'flex' : 'none';
    }

    async function enviarLoteWhatsApp() {
        const ids = Array.from(document.querySelectorAll('.check-p:checked')).map(c => parseInt(c.value));
        const selecionados = pedCache.filter(p => ids.includes(p.id));
        let msg = "*🧁 LISTA DE PRODUÇÃO*\n\n";
        selecionados.forEach((p, i) => msg += `*PEDI #${i+1}*\n${p.itens}\n---\n`);
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    }

    window.onload = () => {
        carregarEstoque();
        const aba = localStorage.getItem('mii_cakes_aba') || 'estoque';
        showTab(aba);
    };
</script>
</body>
</html>
