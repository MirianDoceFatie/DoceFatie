<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mii Cakes - Gestão Elite</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #d63384; --primary-light: #fce4ec;
            --secondary: #5d4037; --bg: #f8f9fa;
            --white: #ffffff; --text: #2d3436;
            --success: #27ae60; --warning: #f39c12; --danger: #e74c3c;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; color: var(--text); }
        header { background: var(--white); padding: 20px; text-align: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        header h1 { margin: 0; font-size: 1.2rem; color: var(--secondary); text-transform: uppercase; }
        .container { padding: 15px; max-width: 800px; margin: 0 auto; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: var(--white); padding: 15px; border-radius: 16px; box-shadow: var(--shadow); text-align: center; }
        .stat-card b { display: block; font-size: 1rem; color: var(--primary); }
        
        .tabs-wrapper { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { padding: 10px 20px; border: none; background: var(--white); border-radius: 50px; font-weight: 600; font-size: 0.8rem; cursor: pointer; white-space: nowrap; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .tab-btn.active { background: var(--primary); color: var(--white); }
        
        .section { display: none; }
        .section.active { display: block; }
        
        .order-card { background: var(--white); border-radius: 20px; padding: 18px; margin-bottom: 15px; box-shadow: var(--shadow); border-left: 6px solid #dfe6e9; }
        .card-pronta { border-left-color: var(--success); }
        .card-reserva { border-left-color: var(--warning); }
        
        .items-box { background: #fdf2f7; border-radius: 12px; padding: 12px; font-size: 0.85rem; margin-bottom: 12px; white-space: pre-wrap; }
        .finance-row { display: flex; justify-content: space-between; font-size: 0.8rem; padding: 10px 0; border-top: 1px solid #f1f1f1; margin-top: 10px; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 15px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; }
        .btn-zap { background: #e8faf0; color: var(--success); }
        .btn-done { background: var(--primary); color: var(--white); }
        
        .input-std { width: 100%; padding: 12px; margin: 5px 0 15px; border-radius: 10px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px 10px; border-top: 1px solid #f8f9fa; }
    </style>
</head>
<body>

    <header><h1>Mii Cakes - Gestão</h1></header>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card"><span>Ativos</span><b id="res-qtd">0</b></div>
            <div class="stat-card"><span>Total</span><b id="res-total">R$ 0</b></div>
            <div class="stat-card"><span>Falta</span><b id="res-falta">R$ 0</b></div>
        </div>

        <div class="tabs-wrapper">
            <button class="tab-btn active" onclick="mudarAba('novos', this)">Pedidos</button>
            <button class="tab-btn" onclick="mudarAba('reservas', this)">Reservas</button>
            <button class="tab-btn" onclick="mudarAba('estoque', this)">Estoque</button>
            <button class="tab-btn" onclick="mudarAba('festival', this)">Festival</button>
            <button class="tab-btn" onclick="mudarAba('historico', this)">Histórico</button>
        </div>

        <div id="aba-novos" class="section active"><div id="lista-novos"></div></div>
        <div id="aba-reservas" class="section"><div id="lista-reservas"></div></div>
        <div id="aba-historico" class="section"><div id="lista-historico"></div></div>

        <div id="aba-estoque" class="section">
            <div style="background:white; padding:20px; border-radius:20px; box-shadow: var(--shadow);">
                <button class="btn-done" style="width:100%; margin-bottom:15px;" onclick="salvarTodoEstoque()">💾 SALVAR TUDO</button>
                <table><tbody id="corpo-estoque"></tbody></table>
            </div>
        </div>

        <div id="aba-festival" class="section">
            <div style="background:white; padding:20px; border-radius:20px; box-shadow: var(--shadow);">
                <label>NOME DO EVENTO</label><input type="text" id="f-nome" class="input-std">
                <label>LOCAL DE RETIRADA</label><input type="text" id="f-local" class="input-std">
                <div style="display:flex; gap:10px;">
                    <div style="flex:1"><label>DATA</label><input type="text" id="f-data" class="input-std"></div>
                    <div style="flex:1"><label>HORÁRIO</label><input type="text" id="f-hora" class="input-std"></div>
                </div>
                <button class="btn-done" style="width:100%" onclick="salvarFestival()">💾 SALVAR CONFIGURAÇÃO</button>
            </div>
        </div>
    </div>

<script>
    const _supa = supabase.createClient('https://byowrfsxtnqoumakbina.supabase.co', 'sb_publishable_BDZCNE4WgBWiFThCvCtdNQ_WYULTwBx');

    async function carregarTudo() {
        const { data: pedidos } = await _supa.from('pedidos').select('*').order('created_at', { ascending: false });
        const { data: estoque } = await _supa.from('estoque').select('*').order('nome');
        const { data: config } = await _supa.from('config').select('*').eq('id', 1).single();

        renderizarPedidos(pedidos || [], 'lista-novos', 'card-pronta', 'PRONTA');
        renderizarPedidos(pedidos || [], 'lista-reservas', 'card-reserva', 'RESERVA');
        renderizarPedidos(pedidos?.filter(p => p.status === 'Finalizado') || [], 'lista-historico', 'card-historico', 'HISTORICO');
        
        if(estoque) renderEstoque(estoque);
        if(config) preencherFestival(config);
        atualizarResumo(pedidos || []);
    }

    function renderizarPedidos(lista, divId, classeExtra, filtroInterno) {
        const container = document.getElementById(divId);
        const html = lista.map(p => {
            if (p.status === 'Finalizado' || p.status === 'Desistiu') {
                if (filtroInterno !== 'HISTORICO') return '';
            } else {
                const temReserva = p.itens && p.itens.includes('[RESERVA]');
                if (filtroInterno === 'PRONTA' && temReserva) return '';
                if (filtroInterno === 'RESERVA' && !temReserva) return '';
            }

            return `
                <div class="order-card ${classeExtra}">
                    <strong>${p.nome || 'Cliente'}</strong><br>
                    <small>📱 ${p.telefone || ''}</small>
                    <div class="items-box">${(p.itens || '').replace(/\n/g, '<br>')}</div>
                    <div class="finance-row">
                        <span>Total: <b>R$ ${(p.valor_total || 0).toFixed(2)}</b></span>
                        <span>Pago: <b>R$ ${(p.valor_pago || 0).toFixed(2)}</b></span>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-zap" onclick="window.open('https://wa.me/55${p.telefone?.replace(/\D/g,'')}')">ZAP</button>
                        ${p.status !== 'Finalizado' ? `<button class="btn btn-done" onclick="concluirPedido('${p.id}', '${encodeURIComponent(p.itens)}')">CONCLUIR</button>` : ''}
                    </div>
                </div>`;
        }).join('');
        container.innerHTML = html || "<p style='text-align:center; opacity:0.5; padding:20px;'>Sem pedidos.</p>";
    }

    async function concluirPedido(id, itensCodificados) {
        if(!confirm("Concluir e baixar estoque?")) return;
        const itensTexto = decodeURIComponent(itensCodificados);
        await _supa.from('pedidos').update({ status: 'Finalizado' }).eq('id', id);
        
        const linhas = itensTexto.split('\n');
        const { data: est } = await _supa.from('estoque').select('*');
        for (const linha of linhas) {
            const match = linha.match(/(\d+)x\s+(.*?)\s+\[/);
            if (match) {
                const qtdVendida = parseInt(match[1]);
                const sabor = match[2].trim();
                const item = est.find(i => i.nome.trim() === sabor);
                if (item) await _supa.from('estoque').update({ quantidade: item.quantidade - qtdVendida }).eq('id', item.id);
            }
        }
        carregarTudo();
    }

    function renderEstoque(estoque) {
        document.getElementById('corpo-estoque').innerHTML = estoque.map(i => `
            <tr class="linha-estoque" data-id="${i.id}">
                <td style="font-weight:600;">${i.nome}</td>
                <td style="text-align:right;"><input type="number" class="val-qtd" value="${i.quantidade}" style="width:60px; padding:8px; border-radius:8px; border:1px solid #ddd; text-align:center;"></td>
            </tr>
        `).join('');
    }

    async function salvarTodoEstoque() {
        const linhas = document.querySelectorAll('.linha-estoque');
        for (let linha of linhas) {
            const id = linha.getAttribute('data-id');
            const quantidade = linha.querySelector('.val-qtd').value;
            await _supa.from('estoque').update({ quantidade }).eq('id', id);
        }
        alert("Estoque atualizado!");
        carregarTudo();
    }

    function preencherFestival(c) {
        document.getElementById('f-nome').value = c.festival_nome || '';
        document.getElementById('f-local').value = c.festival_local || '';
        document.getElementById('f-data').value = c.festival_data || '';
        document.getElementById('f-hora').value = c.festival_hora || '';
    }

    async function salvarFestival() {
        const dados = {
            festival_nome: document.getElementById('f-nome').value,
            festival_local: document.getElementById('f-local').value,
            festival_data: document.getElementById('f-data').value,
            festival_hora: document.getElementById('f-hora').value
        };
        await _supa.from('config').update(dados).eq('id', 1);
        alert("Festival Atualizado!");
    }

    function mudarAba(abaId, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('aba-' + abaId).classList.add('active');
        btn.classList.add('active');
    }

    function atualizarResumo(pedidos) {
        const ativos = pedidos.filter(p => p.status !== 'Finalizado' && p.status !== 'Desistiu');
        const total = ativos.reduce((acc, p) => acc + (p.valor_total || 0), 0);
        const pago = ativos.reduce((acc, p) => acc + (p.valor_pago || 0), 0);
        document.getElementById('res-qtd').innerText = ativos.length;
        document.getElementById('res-total').innerText = `R$ ${total.toFixed(2)}`;
        document.getElementById('res-falta').innerText = `R$ ${(total - pago).toFixed(2)}`;
    }

    window.onload = carregarTudo;
</script>
</body>
</html>
