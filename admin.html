<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mii Cakes - Gestão Elite</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #ff69b4; --primary-dark: #ff4081; --primary-light: #fce4ec;
            --secondary: #5d4037; --bg: #f8f9fa;
            --white: #ffffff; --text: #2d3436;
            --success: #27ae60; --warning: #f39c12; --danger: #e74c3c;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; color: var(--text); padding-bottom: 40px; }
        
        header { 
            background: var(--white); padding: 15px 20px; text-align: center; 
            border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
        }
        header h1 { margin: 0; font-size: 1rem; color: var(--secondary); text-transform: uppercase; letter-spacing: 1px; }
        
        .btn-bastidores { 
            background: var(--primary-light); color: var(--primary-dark); 
            border: none; padding: 8px 15px; border-radius: 12px; 
            font-weight: 700; font-size: 0.7rem; cursor: pointer; text-transform: uppercase;
        }

        .container { padding: 15px; max-width: 800px; margin: 0 auto; }
        
        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: var(--white); padding: 15px; border-radius: 16px; box-shadow: var(--shadow); text-align: center; }
        .stat-card span { font-size: 0.65rem; color: #888; text-transform: uppercase; font-weight: 700; }
        .stat-card b { display: block; font-size: 0.85rem; color: var(--primary-dark); margin-top: 5px; }
        
        /* Tabs */
        .tabs-wrapper { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .tab-btn { padding: 10px 18px; border: none; background: var(--white); border-radius: 50px; font-weight: 600; font-size: 0.75rem; cursor: pointer; white-space: nowrap; box-shadow: 0 2px 5px rgba(0,0,0,0.05); color: #666; }
        .tab-btn.active { background: var(--primary); color: var(--white); }
        
        .section { display: none; }
        .section.active { display: block; }
        
        /* Cards */
        .order-card { background: var(--white); border-radius: 20px; padding: 18px; margin-bottom: 15px; box-shadow: var(--shadow); border-left: 8px solid #dfe6e9; position: relative; }
        .card-pronta { border-left-color: var(--success); }
        .card-reserva { border-left-color: var(--warning); }
        
        .badge-reserva-alerta { 
            background: var(--danger); color: white; padding: 5px 10px; 
            border-radius: 8px; font-size: 0.7rem; font-weight: 900; 
            text-transform: uppercase; position: absolute; top: 18px; right: 18px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .client-info { margin-bottom: 12px; }
        .client-info strong { font-size: 1rem; color: var(--secondary); display: block; }
        .client-address { font-size: 0.75rem; color: #777; display: block; margin-top: 4px; font-style: italic; }

        .items-box { background: #fffafb; border: 1px solid #ffebf2; border-radius: 12px; padding: 12px; font-size: 0.85rem; margin-bottom: 12px; color: #555; }
        .finance-row { display: flex; justify-content: space-between; font-size: 0.8rem; padding-top: 10px; border-top: 1px dotted #eee; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 15px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; }
        .btn-zap { background: #e8faf0; color: var(--success); text-decoration: none; text-align: center; }
        .btn-done { background: var(--secondary); color: var(--white); }
        
        /* Inputs & Tables */
        .card-form { background: white; padding: 20px; border-radius: 20px; box-shadow: var(--shadow); }
        .input-std { width: 100%; padding: 12px; margin: 5px 0 15px; border-radius: 10px; border: 1px solid #ddd; font-family: inherit; font-size: 0.85rem; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 5px; border-top: 1px solid #f8f9fa; font-size: 0.8rem; }
        .input-mini { width: 60px; padding: 8px; border-radius: 8px; border: 1px solid #ddd; text-align: center; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <button class="btn-bastidores" onclick="mudarAba('estoque', document.querySelector('.tab-btn:nth-child(3)'))">Bastidores</button>
        <h1>Mii Cakes Gestão</h1>
        <div style="width: 80px;"></div> </header>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card"><span>Ativos</span><b id="res-qtd">0</b></div>
            <div class="stat-card"><span>Total Bruto</span><b id="res-total">R$ 0</b></div>
            <div class="stat-card"><span>Falta</span><b id="res-falta">R$ 0</b></div>
        </div>

        <div class="tabs-wrapper">
            <button class="tab-btn active" onclick="mudarAba('novos', this)">Pedidos</button>
            <button class="tab-btn" onclick="mudarAba('reservas', this)">Lista Reservas</button>
            <button class="tab-btn" onclick="mudarAba('estoque', this)">Estoque</button>
            <button class="tab-btn" onclick="mudarAba('festival', this)">Festival</button>
            <button class="tab-btn" onclick="mudarAba('historico', this)">Histórico</button>
        </div>

        <div id="aba-novos" class="section active"><div id="lista-novos"></div></div>
        <div id="aba-reservas" class="section"><div id="lista-reservas"></div></div>
        <div id="aba-historico" class="section"><div id="lista-historico"></div></div>

        <div id="aba-estoque" class="section">
            <div class="card-form">
                <button class="btn-done" style="width:100%; margin-bottom:15px; background: var(--success);" onclick="salvarTodoEstoque()">💾 SALVAR ALTERAÇÕES</button>
                <table>
                    <thead>
                        <tr style="font-size: 0.65rem; color: #aaa; text-transform: uppercase;">
                            <th>Sabor</th>
                            <th style="text-align: center;">Qtd</th>
                            <th style="text-align: center;">Fornada</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-estoque"></tbody>
                </table>
            </div>
        </div>

        <div id="aba-festival" class="section">
            <div class="card-form">
                <h3 style="font-size: 0.9rem; margin-bottom: 15px; color: var(--secondary);">Configuração do Festival</h3>
                <label style="font-size: 0.7rem; font-weight: 700;">NOME DO EVENTO</label>
                <input type="text" id="f-nome" class="input-std" placeholder="Ex: Festival de Fatias">
                
                <label style="font-size: 0.7rem; font-weight: 700;">LOCAL DE RETIRADA</label>
                <input type="text" id="f-local" class="input-std" placeholder="Rua Maria Rodrigues Munis, 50">
                
                <div style="display:flex; gap:10px;">
                    <div style="flex:1">
                        <label style="font-size: 0.7rem; font-weight: 700;">DATA</label>
                        <input type="text" id="f-data" class="input-std" placeholder="Ex: 15 de Maio">
                    </div>
                    <div style="flex:1">
                        <label style="font-size: 0.7rem; font-weight: 700;">HORÁRIO</label>
                        <input type="text" id="f-hora" class="input-std" placeholder="Ex: 14h às 18h">
                    </div>
                </div>
                <button class="btn-done" style="width:100%; background: var(--primary);" onclick="salvarFestival()">💾 ATUALIZAR VITRINE</button>
            </div>
        </div>
    </div>

<script>
    const _supa = supabase.createClient('https://byowrfsxtnqoumakbina.supabase.co', 'sb_publishable_BDZCNE4WgBWiFThCvCtdNQ_WYULTwBx');

    async function carregarTudo() {
        const { data: pedidos } = await _supa.from('pedidos').select('*').order('created_at', { ascending: false });
        const { data: estoque } = await _supa.from('estoque').select('*').order('nome');
        const { data: config } = await _supa.from('config').select('*').eq('id', 1).single();

        renderizarPedidos(pedidos || [], 'lista-novos', 'TUDO');
        renderizarPedidos(pedidos || [], 'lista-reservas', 'SOMENTE_RESERVA');
        renderizarPedidos(pedidos?.filter(p => p.status === 'Finalizado') || [], 'lista-historico', 'HISTORICO');
        
        if(estoque) renderEstoque(estoque);
        if(config) preencherFestival(config);
        atualizarResumo(pedidos || []);
    }

    function renderizarPedidos(lista, divId, modoFiltro) {
        const container = document.getElementById(divId);
        const html = lista.map(p => {
            const isFinalizado = p.status === 'Finalizado' || p.status === 'Desistiu';
            const temReserva = (p.status || '').toUpperCase().includes('RESERVA');

            if (modoFiltro === 'HISTORICO' && !isFinalizado) return '';
            if (modoFiltro !== 'HISTORICO' && isFinalizado) return '';
            if (modoFiltro === 'SOMENTE_RESERVA' && !temReserva) return '';

            return `
                <div class="order-card ${temReserva ? 'card-reserva' : 'card-pronta'}">
                    ${temReserva ? '<span class="badge-reserva-alerta">+ RESERVA</span>' : ''}
                    <div class="client-info">
                        <strong>${p.nome || 'Cliente'}</strong>
                        <span class="client-address">📍 ${p.endereco || 'Retirada'}</span>
                        <small>📱 ${p.telefone || ''}</small>
                    </div>
                    <div class="items-box">${(p.itens || '').replace(/\n/g, '<br>')}</div>
                    <div class="finance-row">
                        <span>Total: <b>R$ ${(p.valor_total || 0).toFixed(2)}</b></span>
                        <span style="color: var(--success)">Sinal: <b>R$ ${(p.valor_pago || 0).toFixed(2)}</b></span>
                    </div>
                    <div class="btn-group">
                        <a class="btn btn-zap" href="https://wa.me/55${p.telefone?.replace(/\D/g,'')}" target="_blank">ZAP</a>
                        ${!isFinalizado ? `<button class="btn btn-done" onclick="concluirPedido('${p.id}')">OK</button>` : ''}
                    </div>
                </div>`;
        }).join('');
        container.innerHTML = html || "<p style='text-align:center; opacity:0.3; padding:20px;'>Vazio.</p>";
    }

    async function concluirPedido(id) {
        if(confirm("Pedido concluído?")) {
            await _supa.from('pedidos').update({ status: 'Finalizado' }).eq('id', id);
            carregarTudo();
        }
    }

    function renderEstoque(estoque) {
        document.getElementById('corpo-estoque').innerHTML = estoque.map(i => `
            <tr class="linha-estoque" data-id="${i.id}">
                <td style="font-weight:600;">${i.nome}</td>
                <td style="text-align:center;"><input type="number" class="val-qtd input-mini" value="${i.quantidade}"></td>
                <td style="text-align:center;"><input type="text" class="val-data input-mini" style="width:80px;" value="${i.dados_proximidade || ''}"></td>
            </tr>
        `).join('');
    }

    async function salvarTodoEstoque() {
        const linhas = document.querySelectorAll('.linha-estoque');
        for (let linha of linhas) {
            const id = linha.getAttribute('data-id');
            const quantidade = linha.querySelector('.val-qtd').value;
            const dados_proximidade = linha.querySelector('.val-data').value;
            await _supa.from('estoque').update({ quantidade, dados_proximidade }).eq('id', id);
        }
        alert("Salvo!");
        carregarTudo();
    }

    function preencherFestival(c) {
        document.getElementById('f-nome').value = c.festival_nome || '';
        document.getElementById('f-local').value = c.festival_local || '';
        document.getElementById('f-data').value = c.festival_data || '';
        document.getElementById('f-hora').value = c.festival_hora || '';
    }

    async function salvarFestival() {
        const dados = {
            festival_nome: document.getElementById('f-nome').value,
            festival_local: document.getElementById('f-local').value,
            festival_data: document.getElementById('f-data').value,
            festival_hora: document.getElementById('f-hora').value
        };
        await _supa.from('config').update(dados).eq('id', 1);
        alert("Vitrine Atualizada!");
    }

    function mudarAba(abaId, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('aba-' + abaId).classList.add('active');
        if(btn) btn.classList.add('active');
    }

    function atualizarResumo(pedidos) {
        const ativos = pedidos.filter(p => p.status !== 'Finalizado' && p.status !== 'Desistiu');
        const total = ativos.reduce((acc, p) => acc + (p.valor_total || 0), 0);
        const pago = ativos.reduce((acc, p) => acc + (p.valor_pago || 0), 0);
        document.getElementById('res-qtd').innerText = ativos.length;
        document.getElementById('res-total').innerText = `R$ ${total.toFixed(2)}`;
        document.getElementById('res-falta').innerText = `R$ ${(total - pago).toFixed(2)}`;
    }

    window.onload = carregarTudo;
</script>
</body>
</html>
