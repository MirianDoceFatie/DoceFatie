<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Elite - Mii Cakes</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #fff0f5; color: #5d4037; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #ff69b4; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .container { max-width: 900px; margin: auto; }

        /* Abas */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding: 10px 0; }
        .tab-btn { padding: 12px 20px; border: none; background: white; border-radius: 50px; cursor: pointer; font-weight: bold; color: #ff69b4; box-shadow: 0 2px 5px rgba(0,0,0,0.05); white-space: nowrap; }
        .tab-btn.active { background: #ff69b4; color: white; }

        .section { display: none; }
        .section.active { display: block; }

        /* Cards de Pedido */
        .card-pedido { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 8px solid #2ecc71; position: relative; }
        .card-pedido.is-reserva { border-left-color: #FF9800; }
        .card-pedido.Finalizado { opacity: 0.7; filter: grayscale(0.5); }

        .badge-tipo { position: absolute; top: 15px; right: 15px; padding: 4px 10px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; color: white; }
        .bg-reserva { background: #FF9800; }
        .bg-pronta { background: #2ecc71; }

        .header-pedido { margin-bottom: 15px; }
        .nome-cliente { font-size: 1.2rem; font-weight: bold; margin: 0; }
        .detalhes { background: #fdfdfd; padding: 10px; border-radius: 8px; border: 1px solid #eee; margin: 10px 0; }
        
        /* Estoque Tabela */
        .card-estoque { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; font-size: 0.8rem; color: #888; padding: 10px; }
        td { padding: 12px 10px; border-top: 1px solid #eee; }
        .input-mini { width: 60px; padding: 8px; border-radius: 8px; border: 1px solid #ddd; text-align: center; }

        .acoes { display: flex; gap: 10px; margin-top: 15px; }
        .btn { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 0.8rem; text-transform: uppercase; }
        .btn-whats { background: #25d366; color: white; text-decoration: none; }
        .btn-finalizar { background: #5d4037; color: white; flex: 1; }
        .btn-save { background: #27ae60; color: white; width: 100%; margin-top: 15px; padding: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Mii Cakes - Gestão Elite</h1>

        <div class="tabs">
            <button class="tab-btn active" onclick="mudarAba('novos', this)">Novos</button>
            <button class="tab-btn" onclick="mudarAba('reservas', this)">Reservas</button>
            <button class="tab-btn" onclick="mudarAba('estoque', this)">Estoque</button>
            <button class="tab-btn" onclick="mudarAba('historico', this)">Histórico</button>
        </div>

        <div id="aba-novos" class="section active"><div id="lista-novos"></div></div>
        <div id="aba-reservas" class="section"><div id="lista-reservas"></div></div>
        <div id="aba-historico" class="section"><div id="lista-historico"></div></div>

        <div id="aba-estoque" class="section">
            <div class="card-estoque">
                <table>
                    <thead><tr><th>Sabor</th><th>Qtd</th><th>Próxima Fornada</th></tr></thead>
                    <tbody id="corpo-estoque"></tbody>
                </table>
                <button class="btn btn-save" onclick="salvarEstoque()">💾 SALVAR ALTERAÇÕES</button>
            </div>
        </div>
    </div>

    <script>
        const _supa = supabase.createClient('https://byowrfsxtnqoumakbina.supabase.co', 'sb_publishable_BDZCNE4WgBWiFThCvCtdNQ_WYULTwBx');

        async function carregarDados() {
            const { data: pedidos } = await _supa.from('pedidos').select('*').order('created_at', { ascending: false });
            const { data: estoque } = await _supa.from('estoque').select('*').order('nome');

            renderizarPedidos(pedidos || []);
            renderizarEstoque(estoque || []);
        }

        function renderizarPedidos(pedidos) {
            const containerNovos = document.getElementById('lista-novos');
            const containerReservas = document.getElementById('lista-reservas');
            const containerHist = document.getElementById('lista-historico');

            let htmlNovos = ""; let htmlReservas = ""; let htmlHist = "";

            pedidos.forEach(p => {
                const ehReserva = (p.itens || '').toUpperCase().includes('[RESERVA]');
                const status = p.status || 'Novo';
                
                const cardHtml = `
                    <div class="card-pedido ${ehReserva ? 'is-reserva' : ''} ${status}">
                        <span class="badge-tipo ${ehReserva ? 'bg-reserva' : 'bg-pronta'}">${ehReserva ? 'RESERVA' : 'PRONTA ENTREGA'}</span>
                        <div class="header-pedido">
                            <h2 class="nome-cliente">${p.nome}</h2>
                            <small>${new Date(p.created_at).toLocaleString('pt-BR')}</small>
                        </div>
                        <div class="detalhes">
                            <div class="itens-texto">🛒 ${p.itens}</div>
                            <small>📍 ${p.tipo_entrega}: ${p.endereco || 'Retirada'}</small>
                        </div>
                        <div><strong>Total: R$ ${Number(p.valor_total).toFixed(2)}</strong></div>
                        <div class="acoes">
                            <a href="https://wa.me/55${p.telefone?.replace(/\D/g,'')}" target="_blank" class="btn btn-whats">WhatsApp</a>
                            ${status !== 'Finalizado' ? `<button class="btn btn-finalizar" onclick="concluirPedido(${p.id})">Concluir</button>` : ''}
                        </div>
                    </div>
                `;

                if (status === 'Finalizado') htmlHist += cardHtml;
                else if (ehReserva) htmlReservas += cardHtml;
                else htmlNovos += cardHtml;
            });

            containerNovos.innerHTML = htmlNovos || "<p>Sem novos pedidos pronta entrega.</p>";
            containerReservas.innerHTML = htmlReservas || "<p>Sem reservas pendentes.</p>";
            containerHist.innerHTML = htmlHist || "<p>Histórico vazio.</p>";
        }

        function renderizarEstoque(estoque) {
            document.getElementById('corpo-estoque').innerHTML = estoque.map(i => `
                <tr class="linha-est" data-id="${i.id}">
                    <td><strong>${i.nome}</strong></td>
                    <td><input type="number" class="input-mini qtd" value="${i.quantidade}"></td>
                    <td><input type="text" class="input-mini data" style="width:100px" value="${i.dados_proximidade || ''}"></td>
                </tr>
            `).join('');
        }

        async function salvarEstoque() {
            const linhas = document.querySelectorAll('.linha-est');
            for (let linha of linhas) {
                const id = linha.dataset.id;
                const quantidade = linha.querySelector('.qtd').value;
                const dados_proximidade = linha.querySelector('.data').value;
                await _supa.from('estoque').update({ quantidade, dados_proximidade }).eq('id', id);
            }
            alert("Estoque atualizado!");
            carregarDados();
        }

        async function concluirPedido(id) {
            await _supa.from('pedidos').update({ status: 'Finalizado' }).eq('id', id);
            carregarDados();
        }

        function mudarAba(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('aba-' + id).classList.add('active');
            btn.classList.add('active');
        }

        setInterval(carregarDados, 30000);
        window.onload = carregarDados;
    </script>
</body>
</html>
