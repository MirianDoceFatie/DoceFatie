<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Mii Cakes</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --rosa: #ff69b4; --marrom: #5d4037; --fundo: #fdf2f5; }
        body { font-family: 'Montserrat', sans-serif; background: var(--fundo); margin: 0; padding: 20px; color: var(--marrom); }
        .container { max-width: 900px; margin: auto; }
        
        h1 { text-align: center; color: var(--rosa); text-transform: uppercase; letter-spacing: 2px; }
        
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px; }
        h3 { margin-top: 0; border-bottom: 2px solid var(--fundo); padding-bottom: 10px; font-size: 1rem; text-transform: uppercase; }

        /* Estilo Tabela de Estoque */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; font-size: 0.8rem; color: #888; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        input[type="number"], input[type="text"] { padding: 8px; border: 1px solid #ddd; border-radius: 5px; width: 100%; box-sizing: border-box; }

        /* Estilo Pedidos */
        .pedido-item { border-left: 5px solid var(--rosa); padding: 10px; margin-bottom: 10px; background: #fff; border-radius: 5px; font-size: 0.9rem; position: relative; }
        .btn-check { position: absolute; right: 10px; top: 10px; background: #25d366; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        /* Estilo Festival */
        .grid-fest { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-primario { background: var(--marrom); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; text-transform: uppercase; margin-top: 15px; transition: 0.3s; }
        .btn-primario:hover { background: #3e2723; }
        
        .btn-atualizar { background: var(--rosa); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .status-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; background: #eee; }
    </style>
</head>
<body>

<div class="container">
    <h1>Painel de Controle</h1>

    <!-- CONFIGURAÇÃO DO FESTIVAL -->
    <div class="card">
        <h3>🎡 Configurar Festival de Fatias</h3>
        <div style="margin-bottom: 15px;">
            <label style="font-size: 0.8rem;">Nome do Evento:</label>
            <input type="text" id="f-nome" placeholder="Ex: Festival de Fatias da Mi">
        </div>
        <div style="margin-bottom: 15px;">
            <label style="font-size: 0.8rem;">Local:</label>
            <input type="text" id="f-local" placeholder="Ex: Rua Maria Rodrigues Munis, 50">
        </div>
        <div class="grid-fest">
            <div>
                <label style="font-size: 0.8rem;">Data:</label>
                <input type="text" id="f-data" placeholder="Ex: Sábado, 20/05">
            </div>
            <div>
                <label style="font-size: 0.8rem;">Horário:</label>
                <input type="text" id="f-hora" placeholder="Ex: 14h às 18h">
            </div>
        </div>
        <button class="btn-primario" onclick="salvarFestival()">Atualizar Banner na Vitrine</button>
    </div>

    <!-- GESTÃO DE ESTOQUE -->
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>🍰 Estoque de Fatias</h3>
            <button class="btn-atualizar" onclick="salvarEstoque()">Salvar Alterações</button>
        </div>
        <table id="tabela-estoque">
            <thead>
                <tr>
                    <th>Sabor</th>
                    <th width="80">Qtd</th>
                    <th>Próxima Data (Reserva)</th>
                </tr>
            </thead>
            <tbody id="corpo-estoque">
                <!-- Preenchido via JS -->
            </tbody>
        </table>
    </div>

    <!-- PEDIDOS RECEBIDOS -->
    <div class="card">
        <h3>📥 Pedidos Recentes</h3>
        <div id="lista-pedidos">Carregando pedidos...</div>
    </div>
</div>

<script>
    // CONFIGURAÇÃO SUPABASE
    const supa = supabase.createClient('https://byowrfsxtnqoumakbina.supabase.co', 'sb_publishable_BDZCNE4WgBWiFThCvCtdNQ_WYULTwBx');

    let dadosEstoque = [];

    // 1. CARREGAR TUDO AO INICIAR
    async function iniciar() {
        carregarEstoque();
        carregarFestival();
        carregarPedidos();
    }

    // 2. GESTÃO DO FESTIVAL
    async function carregarFestival() {
        const { data } = await supa.from('config').select('*').single();
        if (data) {
            document.getElementById('f-nome').value = data.festival_nome || "";
            document.getElementById('f-local').value = data.festival_local || "";
            document.getElementById('f-data').value = data.festival_data || "";
            document.getElementById('f-hora').value = data.festival_hora || "";
        }
    }

    async function salvarFestival() {
        const dados = {
            festival_nome: document.getElementById('f-nome').value,
            festival_local: document.getElementById('f-local').value,
            festival_data: document.getElementById('f-data').value,
            festival_hora: document.getElementById('f-hora').value
        };
        const { error } = await supa.from('config').update(dados).eq('id', 1);
        if (error) alert("Erro ao salvar festival");
        else alert("Banner do festival atualizado!");
    }

    // 3. GESTÃO DE ESTOQUE
    async function carregarEstoque() {
        const { data } = await supa.from('estoque').select('*').order('nome');
        dadosEstoque = data;
        const html = data.map((item, i) => `
            <tr>
                <td><small>${item.nome}</small></td>
                <td><input type="number" value="${item.Quantidade}" onchange="atualizarLocal(${i}, 'Quantidade', this.value)"></td>
                <td><input type="text" value="${item.proxima_data || ''}" placeholder="Ex: Sábado" onchange="atualizarLocal(${i}, 'proxima_data', this.value)"></td>
            </tr>
        `).join('');
        document.getElementById('corpo-estoque').innerHTML = html;
    }

    function atualizarLocal(index, campo, valor) {
        dadosEstoque[index][campo] = valor;
    }

    async function salvarEstoque() {
        for (const item of dadosEstoque) {
            await supa.from('estoque').update({ 
                Quantidade: item.Quantidade, 
                proxima_data: item.proxima_data 
            }).eq('id', item.id);
        }
        alert("Estoque atualizado com sucesso!");
        carregarEstoque();
    }

    // 4. GESTÃO DE PEDIDOS
    async function carregarPedidos() {
        const { data } = await supa.from('pedidos').select('*').order('created_at', { ascending: false }).limit(10);
        if (!data || data.length === 0) {
            document.getElementById('lista-pedidos').innerText = "Nenhum pedido recebido.";
            return;
        }
        const html = data.map(p => `
            <div class="pedido-item" style="opacity: ${p.status === 'Concluído' ? '0.5' : '1'}">
                <strong>${p.telefone}</strong> <span class="status-badge">${p.status}</span><br>
                <small>${p.itens}</small><br>
                <span style="color:var(--rosa)">R$ ${p.valor}</span>
                ${p.status !== 'Concluído' ? `<button class="btn-check" onclick="concluirPedido('${p.id}')">✓</button>` : ''}
            </div>
        `).join('');
        document.getElementById('lista-pedidos').innerHTML = html;
    }

    async function concluirPedido(id) {
        await supa.from('pedidos').update({ status: 'Concluído' }).eq('id', id);
        carregarPedidos();
    }

    window.onload = iniciar;
</script>

</body>
</html>
