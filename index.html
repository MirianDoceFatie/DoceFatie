<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confeitaria Doce Fatia</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --rosa-fundo: #fdf2f7; 
            --rosa-header: #f858a5; 
            --rosa-botao: #ff69b4; 
            --whatsapp: #2cc149; 
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--rosa-fundo); margin: 0; padding-bottom: 50px; color: #444; }
        
        header { background-color: var(--rosa-header); color: white; text-align: center; padding: 40px 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        header h1 { margin: 0; font-size: 1.8rem; }
        header p { margin: 10px 0 20px; font-weight: 300; }

        .btn-bastidores { 
            background: white; color: var(--rosa-header); padding: 10px 25px; 
            border-radius: 25px; text-decoration: none; font-weight: bold; 
            font-size: 0.9rem; display: inline-flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .container { max-width: 1000px; margin: -20px auto 0; padding: 0 15px; }

        /* GRID DA VITRINE */
        .grid-fatias { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
        
        .card-bolo { 
            background: white; border-radius: 20px; overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; 
            padding-bottom: 20px; position: relative; transition: 0.3s;
        }
        
        .img-container { width: 100%; height: 180px; position: relative; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .tarja-nome { 
            position: absolute; bottom: 0; left: 0; width: 100%; 
            background: rgba(0,0,0,0.6); color: white; padding: 8px; 
            font-size: 0.85rem; font-weight: bold; box-sizing: border-box;
        }

        .status-estoque { font-size: 0.75rem; font-weight: bold; margin-top: 10px; color: var(--rosa-header); }
        .proxima-data { font-size: 0.7rem; color: #888; margin-bottom: 10px; }

        .controles { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 10px 0; }
        .btn-qtd { 
            background: var(--rosa-botao); color: white; border: none; 
            border-radius: 50%; width: 35px; height: 35px; cursor: pointer; font-size: 1.2rem;
        }

        /* CHECKOUT */
        .checkout { 
            background: white; border-radius: 25px; padding: 30px; 
            margin-top: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
        }
        .checkout h2 { color: var(--rosa-header); margin-top: 0; }

        .campo-label { font-size: 0.85rem; font-weight: bold; margin-bottom: 6px; display: block; color: var(--rosa-header); }
        input { 
            width: 100%; padding: 14px; border: 1px solid #f0f0f0; 
            border-radius: 15px; box-sizing: border-box; margin-bottom: 15px; outline: none;
            background: #fafafa;
        }
        input:focus { border-color: var(--rosa-botao); background: #fff; }

        .btn-opcao { 
            flex: 1; padding: 15px; border: 2px solid #f0f0f0; 
            border-radius: 15px; text-align: center; cursor: pointer; 
            font-weight: bold; color: #999; transition: 0.3s;
        }
        .btn-opcao.ativo { border-color: var(--rosa-botao); background: #fff5f9; color: var(--rosa-botao); }

        .box-total { border: 1px dashed var(--rosa-botao); border-radius: 15px; padding: 20px; text-align: right; margin-bottom: 25px; }

        .btn-whatsapp { 
            background-color: var(--whatsapp); color: white; border: none; 
            width: 100%; padding: 20px; border-radius: 20px; font-weight: bold; 
            cursor: pointer; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(44, 193, 73, 0.3);
        }

        .esgotado { opacity: 0.6; filter: grayscale(0.5); }
    </style>
</head>
<body>

<header>
    <h1>Confeitaria Doce Fatia</h1>
    <p>Fatias Fresquinhas do Dia — R$ 18,00</p>
    <a href="https://www.instagram.com/fatiaqueromais/" target="_blank" class="btn-bastidores">✨ Ver Bastidores & Produção</a>
</header>

<div class="container">
    <!-- Vitrine que carrega do Supabase -->
    <div id="vitrine" class="grid-fatias">Carregando fatias...</div>

    <div class="checkout">
        <h2>Finalizar Reserva</h2>
        
        <div id="resumo" style="color:#888; margin-bottom:20px; border-left: 3px solid var(--rosa-botao); padding-left: 10px; font-size: 0.9rem;">
            Nenhum item selecionado.
        </div>
        
        <!-- NOVO CAMPO DE TELEFONE -->
        <div>
            <label class="campo-label">Seu WhatsApp (com DDD)</label>
            <input type="tel" id="cli-tel" placeholder="(35) 99999-9999">
        </div>

        <label class="campo-label">Como deseja receber?</label>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <div id="btn-entrega" class="btn-opcao" onclick="setMetodo('Entrega')">🚀 Entrega</div>
            <div id="btn-retirada" class="btn-opcao" onclick="setMetodo('Retirar')">🏠 Retirada</div>
        </div>

        <div id="campos-end" style="display:none;">
            <label class="campo-label">Endereço Completo</label>
            <input type="text" id="rua" placeholder="Rua, número e bairro">
        </div>

        <div class="box-total">
            <div style="font-weight:bold; font-size:1.3rem;">Total: <span id="total-valor" style="color: var(--rosa-botao);">R$ 0,00</span></div>
            <small id="aviso-taxa" style="display:none; color:#d81b60;">+ taxa de entrega a consultar</small>
        </div>

        <button class="btn-whatsapp" onclick="confirmarReserva()">Reservar e Enviar no WhatsApp</button>
    </div>
</div>

<script>
    const supabaseClient = supabase.createClient('https://byowrfsxtnqoumakbina.supabase.co', 'sb_publishable_BDZCNE4WgBWiFThCvCtdNQ_WYULTwBx');
    let lista = []; 
    let pedido = {}; 
    let mtd = "";

    async function load() {
        const { data } = await supabaseClient.from('estoque').select('*').order('nome');
        lista = data;
        render();
    }

    function render() {
        document.getElementById('vitrine').innerHTML = lista.map((b, i) => {
            const semEstoque = b.Quantidade <= 0;
            return `
            <div class="card-bolo ${semEstoque ? 'esgotado' : ''}">
                <div class="img-container">
                    <img src="${b.foto}">
                    <div class="tarja-nome">${b.nome}</div>
                </div>
                <div class="status-estoque">${semEstoque ? 'ESGOTADO' : 'Disponíveis: ' + b.Quantidade}</div>
                <div class="proxima-data">${semEstoque && b.proxima_data ? 'Volta: ' + b.proxima_data : ''}</div>
                <div class="controles">
                    <button class="btn-qtd" onclick="qtd(${i}, -1)" ${semEstoque ? 'disabled' : ''}>-</button>
                    <span id="q-${i}" style="font-weight:bold; width:20px;">0</span>
                    <button class="btn-qtd" onclick="qtd(${i}, 1)" ${semEstoque ? 'disabled' : ''}>+</button>
                </div>
            </div>`;
        }).join('');
    }

    function qtd(i, v) {
        if (!pedido[i]) pedido[i] = { q: 0 };
        let nq = pedido[i].q + v;
        if (nq >= 0 && nq <= lista[i].Quantidade) {
            pedido[i].q = nq;
            document.getElementById(`q-${i}`).innerText = nq;
            calc();
        }
    }

    function setMetodo(m) {
        mtd = m;
        document.getElementById('btn-entrega').classList.toggle('ativo', m === 'Entrega');
        document.getElementById('btn-retirada').classList.toggle('ativo', m === 'Retirar');
        document.getElementById('campos-end').style.display = m === 'Entrega' ? 'block' : 'none';
        document.getElementById('aviso-taxa').style.display = m === 'Entrega' ? 'block' : 'none';
    }

    function calc() {
        let t = 0; let res = "";
        for (let i in pedido) {
            if (pedido[i].q > 0) {
                t += pedido[i].q * 18;
                res += `${pedido[i].q}x ${lista[i].nome}<br>`;
            }
        }
        document.getElementById('resumo').innerHTML = res || "Nenhum item selecionado.";
        document.getElementById('total-valor').innerText = `R$ ${t.toFixed(2).replace('.', ',')}`;
    }

    async function confirmarReserva() {
        const tel = document.getElementById('cli-tel').value;
        if (!tel) return alert("Por favor, digite seu WhatsApp!");
        if (!mtd) return alert("Escolha se deseja Entrega ou Retirada!");

        let resumoItens = "";
        let total = 0;
        let temItens = false;

        for (let i in pedido) {
            if (pedido[i].q > 0) {
                const nq = lista[i].Quantidade - pedido[i].q;
                resumoItens += `${pedido[i].q}x ${lista[i].nome}; `;
                total += pedido[i].q * 18;
                temItens = true;
                // Baixa no estoque
                await supabaseClient.from('estoque').update({ Quantidade: nq }).eq('id', lista[i].id);
            }
        }

        if (!temItens) return alert("Adicione pelo menos uma fatia!");

        // Registra o pedido no seu relatório
        await supabaseClient.from('pedidos').insert([
            { itens: resumoItens, valor: total, telefone: tel, status: 'Pendente' }
        ]);

        let msg = `*NOVO PEDIDO - DOCE FATIA*\n\n${resumoItens.replace(/; /g, '\n')}\n*Total:* R$ ${total.toFixed(2)}\n*Entrega:* ${mtd}\n*WhatsApp:* ${tel}`;
        window.open(`https://wa.me/5535991441589?text=${encodeURIComponent(msg)}`);
        location.reload();
    }

    window.onload = load;
</script>
</body>
</html>
