<script>
    // ... (mantenha as outras funções de carregar e renderizar que já funcionam)

    async function confirmarReserva() {
        if (!mtd) return alert("Escolha Entrega ou Retirada!");
        
        let resumoItens = "";
        let total = 0;

        // Prepara os dados e dá baixa no estoque
        for (let i in pedido) {
            if (pedido[i].q > 0) {
                const novaQtd = lista[i].Quantidade - pedido[i].q;
                resumoItens += `${pedido[i].q}x ${lista[i].nome} (${pedido[i].calda}); `;
                total += pedido[i].q * 18;
                
                await supabaseClient.from('estoque').update({ Quantidade: novaQtd }).eq('id', lista[i].id);
            }
        }

        // REGISTRA O CLIQUE NO BANCO DE DADOS PARA O RELATÓRIO
        const { data, error } = await supabaseClient.from('pedidos').insert([
            { 
                itens: resumoItens, 
                valor: total, 
                status: 'Pendente' // Começa como pendente para você confirmar no Admin
            }
        ]);

        let msg = `*NOVO PEDIDO CONFIRMADO*\n\n${resumoItens.replace(/; /g, '\n')}\n*Total:* R$ ${total}\n*Pagamento:* ${pg}`;
        window.open(`https://wa.me/5535991441589?text=${encodeURIComponent(msg)}`);
        location.reload();
    }
</script>
