<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mii Cakes - Fatias & Bolos</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --rosa-topo: #ff69b4; --rosa-fundo: #fff0f5; --rosa-botao: #ff4081; --whatsapp: #25d366; --marrom: #5d4037; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--rosa-fundo); margin: 0; padding-bottom: 50px; color: var(--marrom); }
        
        header { 
            background-color: var(--rosa-topo); 
            color: white; 
            text-align: center; 
            padding: 12px 10px; 
            box-shadow: 0 1px 8px rgba(0,0,0,0.05); 
        }
        header h1 { margin: 0; font-family: 'Great Vibes', cursive; font-size: 2.2rem; font-weight: normal; }
        .subtitulo-elegante { font-family: 'Montserrat', sans-serif; font-weight: 300; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; margin-top: 2px; opacity: 0.9; }
        
        .container { max-width: 900px; margin: auto; padding: 15px; }
        
        .grid-fatias { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 20px; 
            margin-top: 25px; 
        }
        
        .card-bolo { 
            background: white; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 4px 12px rgba(255, 105, 180, 0.08); 
            text-align: center; 
            padding-bottom: 12px;
            border: 1px solid #fff5f8;
        }

        .img-container { 
            width: 110px; 
            height: 110px; 
            margin: 15px auto 10px;
            border-radius: 50%; 
            overflow: hidden;
            border: 2px solid #fce4ec;
            position: relative;
        }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .nome-produto { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; padding: 0 8px; color: var(--marrom); line-height: 1.2; }
        
        .status-estoque { font-size: 0.65rem; font-weight: 600; margin-top: 5px; color: var(--rosa-topo); }
        .disponivel-em { font-size: 0.65rem; color: #d81b60; font-weight: 600; margin-top: 5px; }

        .controles { display: flex; justify-content: center; align-items: center; gap: 8px; margin: 8px 0; }
        .btn-qtd { background: var(--rosa-botao); color: white; border: none; border-radius: 50%; width: 26px; height: 26px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; }
        .select-personalizado { width: 85%; font-size: 0.7rem; padding: 6px; border-radius: 8px; border: 1px solid #fce4ec; font-family: 'Montserrat', sans-serif; background: #fffafb; }

        .checkout { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-top: 35px; border: 1px solid #fff5f8; text-align: center; }
        .btn-opcao { flex: 1; padding: 10px; border: 1px solid #fce4ec; border-radius: 10px; cursor: pointer; text-align: center; font-weight: 600; text-transform: uppercase; font-size: 0.7rem; transition: 0.3s; }
        .btn-opcao.ativo { border-color: var(--rosa-topo); background: #fff5f8; color: var(--rosa-topo); }
        
        .aviso-taxa-rosa { color: var(--rosa-topo); font-weight: 600; font-size: 0.75rem; margin: 15px 0; display: none; text-align: center; }
        
        input { width: 100%; padding: 12px; margin-top: 8px; border-radius: 10px; border: 1px solid #f3f3f3; box-sizing: border-box; font-size: 0.85rem; font-family: 'Montserrat', sans-serif; }
        .valor-total-container { margin: 20px 0; padding: 12px; background: #fffafb; border-radius: 10px; border: 1px dashed var(--rosa-topo); text-align: right; font-weight: 600; }
        
        /* Botão WhatsApp Menor e Delicado */
        .btn-whatsapp { 
            background-color: var(--whatsapp); 
            color: white; 
            border: none; 
            padding: 12px 30px; 
            border-radius: 25px; 
            font-weight: 400; 
            cursor: pointer; 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-family: 'Montserrat', sans-serif;
            display: inline-block;
            transition: transform 0.2s ease;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.2);
        }
        .btn-whatsapp:active { transform: scale(0.98); }
    </style>
</head>
<body>

<header>
    <h1>Mii Cakes</h1>
    <div class="subtitulo-elegante">Fatias & Bolos — R$ 18,00</div>
</header>

<div class="container">
    <div id="vitrine" class="grid-fatias">Carregando cardápio...</div>

    <div class="checkout">
        <h3 style="margin:0; text-transform: uppercase; font-size: 0.8rem; text-align:center; letter-spacing: 1px;">Resumo do Pedido</h3>
        <div id="resumo" style="font-size: 0.75rem; color: #888; margin: 12px 0; text-align:center;">Escolha suas delícias acima.</div>
        
        <label style="font-size:0.65rem; font-weight:600; text-transform: uppercase; color: #aaa; display: block; text-align: left;">Seu WhatsApp</label>
        <input type="tel" id="cli-tel" placeholder="(00) 00000-0000">

        <div style="display:flex; gap:10px; margin: 20px 0;">
            <div id="btn-entrega" class="btn-opcao" onclick="setMetodo('Entrega')">Entrega</div>
            <div id="btn-retirada" class="btn-opcao" onclick="setMetodo('Retirada')">Retirar</div>
        </div>

        <div id="msg-taxa" class="aviso-taxa-rosa">
            🌸 Finalize o pedido para receber informação de entrega
        </div>

        <div id="form-endereco" style="display:none;">
            <input type="text" id="end-rua" placeholder="Rua e número">
            <input type="text" id="end-bairro" placeholder="Bairro">
        </div>

        <div class="valor-total-container">
            TOTAL: <span id="total-valor" style="color:var(--rosa-botao); font-size: 1.3rem;">R$ 0,00</span>
        </div>

        <button class="btn-whatsapp" onclick="enviarPedido()">Fazer Pedido</button>
    </div>
</div>

<script>
    const _supa = supabase.createClient('https://byowrfsxtnqoumakbina.supabase.co', 'sb_publishable_BDZCNE4WgBWiFThCvCtdNQ_WYULTwBx');
    let bolos = [];
    let carrinho = {};
    let mtd = "";

    async function carregar() {
        const { data } = await _supa.from('estoque').select('*').order('nome');
        bolos = data;
        render();
    }

    function render() {
        document.getElementById('vitrine').innerHTML = bolos.map((b, i) => {
            const esgotado = b.Quantidade <= 0;
            return `
            <div class="card-bolo">
                <div class="img-container">
                    <img src="${b.foto}">
                </div>
                <div class="nome-produto">${b.nome}</div>
                ${esgotado ? `<div class="disponivel-em">Disponível: ${b.proxima_data || 'Em breve'}</div>` : `<div class="status-estoque">Restam: ${b.Quantidade}</div>`}
                
                <div class="controles">
                    <button class="btn-qtd" onclick="alt(${i}, -1)">-</button>
                    <span id="q-${i}" style="font-weight:600; font-size:0.9rem;">0</span>
                    <button class="btn-qtd" onclick="alt(${i}, 1)">+</button>
                </div>
                <select id="calda-${i}" class="select-personalizado" onchange="updateCalda(${i}, this.value)">
                    <option value="Sem calda">Sem Calda</option>
                    <option value="Chocolate">Calda Chocolate</option>
                    <option value="Ninho">Calda Ninho</option>
                </select>
            </div>`;
        }).join('');
    }

    function alt(i, v) {
        if (!carrinho[i]) carrinho[i] = { q: 0, calda: "Sem calda" };
        let n = carrinho[i].q + v;
        if (n >= 0) { 
            carrinho[i].q = n;
            document.getElementById(`q-${i}`).innerText = n;
            atualizar();
        }
    }

    function updateCalda(i, c) {
        if (!carrinho[i]) carrinho[i] = { q: 0 };
        carrinho[i].calda = c;
        atualizar();
    }

    function setMetodo(m) {
        mtd = m;
        document.getElementById('btn-entrega').classList.toggle('ativo', m === 'Entrega');
        document.getElementById('btn-retirada').classList.toggle('ativo', m === 'Retirada');
        const isEntrega = m === 'Entrega';
        document.getElementById('form-endereco').style.display = isEntrega ? 'block' : 'none';
        document.getElementById('msg-taxa').style.display = isEntrega ? 'block' : 'none';
        if (!isEntrega) {
            document.getElementById('end-rua').value = "";
            document.getElementById('end-bairro').value = "";
        }
    }

    function atualizar() {
        let total = 0; let resumoTxt = "";
        for (let i in carrinho) {
            if (carrinho[i].q > 0) {
                total += carrinho[i].q * 18;
                resumoTxt += `• ${carrinho[i].q}x ${bolos[i].nome} (${carrinho[i].calda})<br>`;
            }
        }
        document.getElementById('resumo').innerHTML = resumoTxt || "Escolha suas delícias acima.";
        document.getElementById('total-valor').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
    }

    async function enviarPedido() {
        const tel = document.getElementById('cli-tel').value;
        if(!tel || !mtd) return alert("Por favor, preencha seu WhatsApp e selecione Entrega ou Retirada.");
        
        let pedidoFinal = "";
        let temItens = false;
        for(let i in carrinho) {
            if(carrinho[i].q > 0) {
                temItens = true;
                let statusItem = bolos[i].Quantidade <= 0 ? `[RESERVA]` : "[PRONTA]";
                pedidoFinal += `${carrinho[i].q}x ${bolos[i].nome} (${carrinho[i].calda}) ${statusItem}\n`;
                if(bolos[i].Quantidade > 0) {
                    let novoEstoque = Math.max(0, bolos[i].Quantidade - carrinho[i].q);
                    await _supa.from('estoque').update({ Quantidade: novoEstoque }).eq('id', bolos[i].id);
                }
            }
        }
        if(!temItens) return alert("Selecione pelo menos uma fatia!");

        let msgZap = `*PEDIDO MII CAKES*\n\n${pedidoFinal}\n*Método:* ${mtd}\n*WhatsApp:* ${tel}`;
        if(mtd === 'Entrega') msgZap += `\n*Endereço:* ${document.getElementById('end-rua').value}, ${document.getElementById('end-bairro').value}`;

        window.open(`https://wa.me/5535991441589?text=${encodeURIComponent(msgZap)}`);
        location.reload();
    }
    window.onload = carregar;
</script>
</body>
</html>
