<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mii Cakes - Vitrine</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fdf2f7; margin: 0; padding: 0; color: #333; }
        .header { background: #f858a5; color: white; padding: 25px; text-align: center; border-radius: 0 0 30px 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .card img { width: 90px; height: 90px; border-radius: 15px; object-fit: cover; }
        .info { flex: 1; }
        .info h3 { margin: 0; font-size: 1.1rem; color: #d03078; }
        .info p { margin: 5px 0; font-size: 0.9rem; color: #666; }
        .preco { font-weight: bold; color: #f858a5; font-size: 1.1rem; }
        
        .controls { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        .btn-count { background: #f858a5; color: white; border: none; width: 30px; height: 30px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; }
        .count { font-weight: bold; font-size: 1rem; width: 20px; text-align: center; }
        
        select { width: 100%; padding: 8px; border-radius: 10px; border: 1px solid #ddd; margin-top: 5px; background: #fffafc; }
        
        .carrinho-fixo { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 20px; border-radius: 30px 30px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        .btn-whatsapp { background: #2cc149; color: white; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 10px; }
        .btn-whatsapp:disabled { background: #ccc; }
        
        .badge-reserva { background: #ff9800; color: white; padding: 3px 8px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; margin-bottom: 5px; display: inline-block; }
        input[type="text"], input[type="tel"] { width: 93%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; margin-top: 8px; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0;">Mii Cakes 🍰</h1>
    <p style="margin:5px 0 0;">Fatias Premium & Gourmet</p>
</div>

<div class="container" id="lista-bolos" style="margin-bottom: 300px;">
    <!-- Itens carregados via JS -->
</div>

<div class="carrinho-fixo">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <span style="font-weight: bold; color: #666;">Total do Pedido:</span>
        <span id="total-valor" style="font-size: 1.4rem; font-weight: bold; color: #f858a5;">R$ 0,00</span>
    </div>

    <input type="tel" id="cli-tel" placeholder="Seu WhatsApp (Ex: 35 99999-9999)" oninput="this.value = this.value.replace(/\D/g,'')">
    
    <div style="display: flex; gap: 5px; margin-top: 10px;">
        <button onclick="setMetodo('Retirada')" id="btn-ret" style="flex:1; padding: 10px; border-radius: 10px; border: 1px solid #ddd; background: white; cursor: pointer;">Retirada</button>
        <button onclick="setMetodo('Entrega')" id="btn-ent" style="flex:1; padding: 10px; border-radius: 10px; border: 1px solid #ddd; background: white; cursor: pointer;">Entrega</button>
    </div>

    <div id="campos-entrega" style="display:none;">
        <input type="text" id="end-rua" placeholder="Rua e Número">
        <input type="text" id="end-bairro" placeholder="Bairro">
    </div>

    <select id="pagamento" onchange="pg = this.value" style="margin-top: 10px;">
        <option value="Pix">Pagar no Pix</option>
        <option value="Cartão">Cartão de Crédito/Débito</option>
        <option value="Dinheiro">Dinheiro (Espécie)</option>
    </select>

    <button class="btn-whatsapp" onclick="enviarPedido()">Fazer Pedido</button>
</div>

<script>
    const _supa = supabase.createClient('https://byowrfsxtnqoumakbina.supabase.co', 'sb_publishable_BDZCNE4WgBWiFThCvCtdNQ_WYULTwBx');
    let bolos = [];
    let carrinho = {};
    let mtd = "";
    let pg = "Pix";
    let valorTotalGlobal = 0;

    async function carregar() {
        const { data } = await _supa.from('estoque').select('*').order('nome');
        bolos = data;
        render();
    }

    function render() {
        document.getElementById('lista-bolos').innerHTML = bolos.map((b, i) => {
            const esgotado = b.Quantidade <= 0;
            return `
            <div class="card" style="${esgotado ? 'opacity: 0.8;' : ''}">
                <img src="${b.foto}">
                <div class="info">
                    ${esgotado ? `<span class="badge-reserva">RESERVA PARA ${b.proxima_data || 'Sábado'}</span>` : ''}
                    <h3>${b.nome}</h3>
                    <p>${b.descricao || 'Fatia artesanal premium.'}</p>
                    <div class="preco">R$ ${b.Preco.toFixed(2)}</div>
                    
                    <select onchange="updateCalda(${i}, this.value)">
                        <option value="Sem Calda">Sem Calda Extra</option>
                        <option value="Ninho">Calda de Ninho</option>
                        <option value="Chocolate">Calda de Chocolate</option>
                    </select>

                    <div class="controls">
                        <button class="btn-count" onclick="update(${i}, -1)">-</button>
                        <span class="count" id="count-${i}">0</span>
                        <button class="btn-count" onclick="update(${i}, 1)">+</button>
                    </div>
                </div>
            </div>
        `}).join('');
    }

    function update(i, v) {
        if(!carrinho[i]) carrinho[i] = { q: 0, calda: "Sem Calda" };
        carrinho[i].q = Math.max(0, carrinho[i].q + v);
        document.getElementById(`count-${i}`).innerText = carrinho[i].q;
        calc();
    }

    function updateCalda(i, calda) {
        if(!carrinho[i]) carrinho[i] = { q: 0, calda: "Sem Calda" };
        carrinho[i].calda = calda;
    }

    function calc() {
        let total = 0;
        for(let i in carrinho) total += carrinho[i].q * bolos[i].Preco;
        valorTotalGlobal = total;
        document.getElementById('total-valor').innerText = `R$ ${total.toFixed(2)}`;
    }

    function setMetodo(m) {
        mtd = m;
        document.getElementById('campos-entrega').style.display = m === 'Entrega' ? 'block' : 'none';
        document.getElementById('btn-ent').style.background = m === 'Entrega' ? '#f858a5' : 'white';
        document.getElementById('btn-ent').style.color = m === 'Entrega' ? 'white' : '#333';
        document.getElementById('btn-ret').style.background = m === 'Retirada' ? '#f858a5' : 'white';
        document.getElementById('btn-ret').style.color = m === 'Retirada' ? 'white' : '#333';
    }

    async function enviarPedido() {
        const telCliente = document.getElementById('cli-tel').value;
        if(telCliente.length < 10 || !mtd) return alert("Informe seu WhatsApp e escolha Entrega ou Retirada.");
        
        let itensMsg = ""; 
        let itensRelatorio = ""; 
        let tem = false;

        for(let i in carrinho) {
            if(carrinho[i].q > 0) {
                tem = true;
                let tipoItem = bolos[i].Quantidade <= 0 ? "[RESERVA]" : "[PRONTA]";
                itensMsg += `${carrinho[i].q}x ${bolos[i].nome} (${carrinho[i].calda}) ${tipoItem}\n`;
                itensRelatorio += `${carrinho[i].q}x ${bolos[i].nome} (${carrinho[i].calda}) ${tipoItem}; `;
            }
        }
        
        if(!tem) return alert("Seu carrinho está vazio!");

        const btn = document.querySelector('.btn-whatsapp');
        btn.innerText = "Registrando...";
        btn.disabled = true;

        try {
            // SALVA NO BANCO ANTES DE ABRIR WHATSAPP
            await _supa.from('pedidos').insert([
                { 
                    itens: itensRelatorio, 
                    valor: valorTotalGlobal, 
                    telefone: telCliente,
                    status: 'Pendente'
                }
            ]);
        } catch (e) { console.error(e); }

        let msg = `*NOVO PEDIDO MII CAKES*\n\n${itensMsg}\n*Total:* ${document.getElementById('total-valor').innerText}\n*Pagamento:* ${pg}\n*WhatsApp Cliente:* ${telCliente}\n\n*Opção:* ${mtd}`;
        
        if(mtd === 'Entrega') {
            msg += `\n*Endereço:* ${document.getElementById('end-rua').value} - ${document.getElementById('end-bairro').value}`;
        } else {
            msg += `\n*Local Retirada:* Rua Maria Rodrigues Munis, 50 - Rebourgeon`;
        }

        setTimeout(() => {
            btn.innerText = "Fazer Pedido";
            btn.disabled = false;
            window.open(`https://wa.me/5535991441589?text=${encodeURIComponent(msg)}`);
        }, 600);
    }

    window.onload = carregar;
</script>
</body>
</html>
