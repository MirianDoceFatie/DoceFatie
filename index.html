<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Doce Fatia</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* USANDO SUAS CORES DEFINIDAS */
        :root { 
            --rosa-fundo: #fdf2f7; 
            --rosa-header: #f858a5; 
            --rosa-botao: #ff69b4; 
            --cinza-claro: #f0f0f0;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--rosa-fundo); margin: 0; padding: 20px; color: #444; }
        
        .header-admin { text-align: center; color: var(--rosa-header); margin-bottom: 30px; }
        
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        
        /* BOTÕES ARREDONDADOS IGUAL AO SEU DESIGN */
        .tab-btn { 
            padding: 12px 25px; border: none; border-radius: 25px; cursor: pointer; 
            background: var(--cinza-claro); font-weight: bold; color: #888; transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .tab-btn.active { background: var(--rosa-header); color: white; }

        /* CARDS COM SOMBRA IGUAL À VITRINE */
        .section { 
            max-width: 800px; margin: 0 auto; background: white; padding: 25px; 
            border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
        }

        .card-estoque { 
            display: flex; align-items: center; gap: 15px; padding: 15px; 
            border-bottom: 1px solid #f9f9f9; 
        }
        .card-estoque img { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; }
        
        /* INPUTS ESTILIZADOS */
        input { 
            border: 1px solid #eee; padding: 8px; border-radius: 10px; 
            outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--rosa-botao); }

        .btn-salvar { 
            background: var(--rosa-botao); color: white; border: none; 
            padding: 10px 18px; border-radius: 15px; cursor: pointer; 
            font-weight: bold; font-size: 0.8rem;
        }

        /* TABELA DE RELATÓRIO LIMPA */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85rem; }
        th { text-align: left; padding: 12px; color: var(--rosa-header); border-bottom: 2px solid var(--rosa-fundo); }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .status-venda { color: #2cc149; font-weight: bold; background: #e8f7ec; padding: 4px 8px; border-radius: 8px; }
        .status-cancelado { color: #f44336; font-weight: bold; background: #fdecea; padding: 4px 8px; border-radius: 8px; }
        
        .btn-acao { 
            border: none; width: 32px; height: 32px; border-radius: 50%; 
            cursor: pointer; color: white; font-size: 0.9rem; margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="header-admin">
        <h1>Gerenciamento Doce Fatia 🍰</h1>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="btn-tab-est" onclick="showTab('estoque')">📦 Estoque</button>
        <button class="tab-btn" id="btn-tab-rel" onclick="showTab('relatorio')">📊 Relatório de Vendas</button>
    </div>

    <div id="tab-estoque" class="section">
        <h3 style="margin-top:0; color: var(--rosa-header);">Controle de Fatias</h3>
        <div id="lista-estoque">Carregando...</div>
    </div>

    <div id="tab-relatorio" class="section" style="display:none;">
        <h3 style="margin-top:0; color: var(--rosa-header);">Cliques e Vendas</h3>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>WhatsApp</th>
                        <th>Itens</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="lista-pedidos"></tbody>
            </table>
        </div>
    </div>

<script>
    const supabaseClient = supabase.createClient('https://byowrfsxtnqoumakbina.supabase.co', 'sb_publishable_BDZCNE4WgBWiFThCvCtdNQ_WYULTwBx');

    function showTab(tab) {
        document.getElementById('tab-estoque').style.display = tab === 'estoque' ? 'block' : 'none';
        document.getElementById('tab-relatorio').style.display = tab === 'relatorio' ? 'block' : 'none';
        document.getElementById('btn-tab-est').classList.toggle('active', tab === 'estoque');
        document.getElementById('btn-tab-rel').classList.toggle('active', tab === 'relatorio');
        if(tab === 'relatorio') carregarRelatorio();
    }

    async function carregarEstoque() {
        const { data } = await supabaseClient.from('estoque').select('*').order('nome');
        document.getElementById('lista-estoque').innerHTML = data.map(b => `
            <div class="card-estoque">
                <img src="${b.foto}">
                <div style="flex:1">
                    <div style="font-weight:bold; margin-bottom:5px;">${b.nome}</div>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <small>Qtd:</small>
                        <input type="number" id="q-${b.id}" value="${b.Quantidade}" style="width:50px;">
                        <small>Volta em:</small>
                        <input type="text" id="d-${b.id}" value="${b.proxima_data||''}" placeholder="Ex: Sábado" style="width:100px;">
                    </div>
                </div>
                <button class="btn-salvar" onclick="salvarEstoque(${b.id})">OK</button>
            </div>
        `).join('');
    }

    async function salvarEstoque(id) {
        const q = document.getElementById(`q-${id}`).value;
        const d = document.getElementById(`d-${id}`).value;
        await supabaseClient.from('estoque').update({ Quantidade: q, proxima_data: d }).eq('id', id);
        alert("Estoque atualizado!");
        carregarEstoque();
    }

    async function carregarRelatorio() {
        const { data } = await supabaseClient.from('pedidos').select('*').order('created_at', { ascending: false });
        const lista = document.getElementById('lista-pedidos');
        lista.innerHTML = data.map(p => `
            <tr>
                <td>${new Date(p.created_at).toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'})}</td>
                <td><a href="https://wa.me/55${p.telefone.replace(/\D/g,'')}" target="_blank" style="color:#2cc149; font-weight:bold; text-decoration:none;">📱 Ver</a></td>
                <td style="font-size:0.7rem; color:#666;">${p.itens}</td>
                <td><span class="status-${p.status.toLowerCase()}">${p.status}</span></td>
                <td style="min-width:80px;">
                    <button class="btn-acao" style="background:#2cc149" onclick="setStatus(${p.id}, 'Venda')">✓</button>
                    <button class="btn-acao" style="background:#f44336" onclick="setStatus(${p.id}, 'Cancelado')">✕</button>
                </td>
            </tr>
        `).join('');
    }

    async function setStatus(id, st) {
        await supabaseClient.from('pedidos').update({ status: st }).eq('id', id);
        carregarRelatorio();
    }

    window.onload = carregarEstoque;
</script>
</body>
</html>
